<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking | Ernest-Shoot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="navbar">
      <div class="logo">Ernest<span>-Shoot</span></div>
      <nav>
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="client-gallery.html">Client Gallery</a>
        <a href="booking.html" class="active">Booking</a>
      </nav>
    </div>
  </header>

  <section class="section">
    <h2>Book a Photoshoot</h2>
    <p class="section-intro">Fill out the form below to request your session.</p>

    <form class="form-box"
      action="https://formspree.io/f/mpqeneve"
      method="POST">

      <label for="name">Full Name</label>
      <input type="text" id="name" name="Full Name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="Email" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="Phone Number">

    
      <label for="package">Choose Package</label>
      <select id="package" name ="package" required>
        <option value="">Select package</option>
        <option>Indoor Portrait Session - $200</option>
        <option>Outdoor Portrait Session - $250</option>
        <option>Custom Session</option>
      </select>

      <label for="date">Preferred Date</label>
      <input type="date" id="date" name="Preferred Date" required>

      <label for="message">Message</label>
      <textarea id="message" name="Message"placeholder="Tell me about your shoot idea..."></textarea>

      <br><br>
      <button class="btn" type="submit">Submit Booking Request</button>
      <p id="bookingStatus" style="margin-top: 15px;"></p>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 Ernest-Shoot. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
